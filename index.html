<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link id="favicon" rel="icon" type="image/png" href="">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #F5F5EF;
      --header-bg: #F6F5F0;
      --text: #111111;
      --border: #DDDDD7;
      --font-header: 'Source Sans Pro', sans-serif;
      --font-body: 'Noto Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 26px; min-height: 100vh;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--header-bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 72px;
    }

    .logo {
      font-family: var(--font-header); font-size: 36px; font-weight: 400;
      letter-spacing: -0.5px; color: var(--text); text-decoration: none;
      display: flex; align-items: center;
    }

    .logo img { height: 36px; width: auto; }

    nav { display: flex; gap: 48px; align-items: center; }

    nav a {
      font-family: var(--font-header); font-size: 18px; font-weight: 400;
      color: var(--text); text-decoration: none; opacity: 0.55;
      letter-spacing: 0.02em; transition: opacity 0.2s; position: relative;
    }

    nav a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--text); transition: width 0.25s ease;
    }

    nav a:hover, nav a.active { opacity: 1; }
    nav a:hover::after, nav a.active::after { width: 100%; }

    .page { display: none; min-height: 100vh; padding-top: 72px; }
    .page.active { display: block; }

    /* HOME */
    .hero { padding: 80px 56px 60px; }
    .hero h1 { font-family: var(--font-header); font-size: 36px; font-weight: 400; line-height: 1.3; max-width: 640px; margin-bottom: 18px; }
    .hero p { font-size: 22px; opacity: 0.6; max-width: 520px; line-height: 1.6; }

    .section-label { font-family: var(--font-header); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; padding: 0 56px; margin-bottom: 24px; }

    .projects-scroll-wrap { padding: 0 56px 80px; overflow: hidden; }
    .projects-scroll { display: flex; gap: 24px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 20px; cursor: grab; }
    .projects-scroll:active { cursor: grabbing; }
    .projects-scroll::-webkit-scrollbar { height: 4px; }
    .projects-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 4px; }
    .projects-scroll::-webkit-scrollbar-thumb { background: var(--text); border-radius: 4px; }

    .project-card { flex: 0 0 340px; height: 420px; scroll-snap-align: start; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; background: var(--header-bg); transition: transform 0.2s, box-shadow 0.2s; }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.08); }

    .card-thumb { width: 100%; height: 240px; background: var(--border); overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-header); font-size: 72px; opacity: 0.15; }

    .card-body { padding: 24px 24px 20px; }
    .card-tag { font-family: var(--font-header); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; margin-bottom: 10px; }
    .card-title { font-family: var(--font-header); font-size: 22px; font-weight: 600; margin-bottom: 10px; line-height: 1.2; }
    .card-desc { font-size: 16px; opacity: 0.55; line-height: 1.5; }
    .card-arrow { position: absolute; bottom: 20px; right: 20px; font-size: 20px; opacity: 0.3; transition: opacity 0.2s, transform 0.2s; }
    .project-card:hover .card-arrow { opacity: 0.8; transform: translateX(4px); }

    /* PROJECTS LIST */
    .projects-header { padding: 60px 56px 40px; border-bottom: 1px solid var(--border); }
    .projects-header h1 { font-family: var(--font-header); font-size: 36px; font-weight: 400; }

    .project-slide { padding: 64px 56px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; min-height: 60vh; }
    .project-slide:nth-child(even) .slide-visual { order: 2; }
    .project-slide:nth-child(even) .slide-content { order: 1; }

    .slide-visual { aspect-ratio: 4/3; background: var(--header-bg); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--font-header); font-size: 96px; opacity: 0.12; overflow: hidden; }
    .slide-visual img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .slide-num { font-family: var(--font-header); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.35; margin-bottom: 20px; }
    .slide-title { font-family: var(--font-header); font-size: 36px; font-weight: 600; margin-bottom: 16px; line-height: 1.15; }
    .slide-tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .slide-tag { font-family: var(--font-header); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--border); padding: 4px 12px; border-radius: 2px; }
    .slide-desc { font-size: 20px; line-height: 1.65; opacity: 0.7; margin-bottom: 32px; }
    .slide-link { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-header); font-size: 16px; letter-spacing: 0.04em; text-decoration: none; color: var(--text); border-bottom: 1px solid var(--text); padding-bottom: 2px; opacity: 0.7; transition: opacity 0.2s; cursor: pointer; }
    .slide-link:hover { opacity: 1; }

    /* DETAIL */
    .detail-back { display: block; padding: 32px 56px 0; font-family: var(--font-header); font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.45; cursor: pointer; text-decoration: none; color: var(--text); transition: opacity 0.2s; }
    .detail-back:hover { opacity: 0.9; }

    .detail-top { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); min-height: 72vh; }
    .detail-intro { padding: 48px 56px 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }

    .detail-title { font-family: var(--font-header); font-size: 36px; font-weight: 600; line-height: 1.1; margin-bottom: 16px; }
    .detail-subtitle { font-family: var(--font-header); font-size: 20px; font-weight: 400; opacity: 0.5; margin-bottom: 28px; line-height: 1.4; }
    .detail-tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
    .detail-tag { font-family: var(--font-header); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--border); padding: 5px 14px; border-radius: 2px; }
    .detail-description { font-size: 20px; line-height: 1.8; opacity: 0.7; }
    .detail-description p { margin-bottom: 20px; }
    .detail-description p:last-child { margin-bottom: 0; }

    .detail-hero-img { background: var(--border); overflow: hidden; }
    .detail-hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-hero-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-header); font-size: 120px; opacity: 0.1; }

    .detail-meta { display: flex; border-bottom: 1px solid var(--border); }
    .detail-meta-item { flex: 1; padding: 36px 40px; border-right: 1px solid var(--border); }
    .detail-meta-item:last-child { border-right: none; }
    .detail-meta-label { font-family: var(--font-header); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; margin-bottom: 10px; }
    .detail-meta-value { font-family: var(--font-header); font-size: 18px; }
    .detail-meta-value a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; transition: border-color 0.2s; }
    .detail-meta-value a:hover { border-color: var(--text); }

    .detail-gallery { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
    .detail-gallery-item { aspect-ratio: 4/3; background: var(--header-bg); border-right: 1px solid var(--border); overflow: hidden; }
    .detail-gallery-item:last-child { border-right: none; }
    .detail-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-gallery-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-header); font-size: 48px; opacity: 0.1; }

    .detail-next { padding: 56px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
    .detail-next:hover { background: var(--header-bg); }
    .detail-next-label { font-family: var(--font-header); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
    .detail-next-title { font-family: var(--font-header); font-size: 28px; font-weight: 400; }
    .detail-next-arrow { font-size: 32px; opacity: 0.3; transition: transform 0.2s, opacity 0.2s; }
    .detail-next:hover .detail-next-arrow { transform: translateX(8px); opacity: 0.8; }

    /* ABOUT */
    .about-inner { padding: 80px 56px; }
    .about-inner h1 { font-family: var(--font-header); font-size: 36px; font-weight: 400; margin-bottom: 48px; }
    .about-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 72px; align-items: start; }
    .about-photo-col img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; border: 1px solid var(--border); }
    .about-photo-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--header-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 48px; opacity: 0.15; }
    .about-body p { font-size: 22px; line-height: 1.75; opacity: 0.75; margin-bottom: 28px; }
    .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 48px; padding-top: 40px; border-top: 1px solid var(--border); }
    .skill-group h3 { font-family: var(--font-header); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; margin-bottom: 16px; }
    .skill-group ul { list-style: none; }
    .skill-group li { font-size: 20px; opacity: 0.7; padding: 6px 0; border-bottom: 1px solid var(--border); }

    /* CONTACT */
    .contact-inner { max-width: 640px; margin: 0 auto; padding: 80px 56px; }
    .contact-inner h1 { font-family: var(--font-header); font-size: 36px; font-weight: 400; margin-bottom: 16px; }
    .contact-inner .sub { font-size: 20px; opacity: 0.55; margin-bottom: 56px; line-height: 1.6; }
    .contact-form label { display: block; font-family: var(--font-header); font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; margin-bottom: 8px; }
    .contact-form input, .contact-form textarea { display: block; width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 12px 0; font-family: var(--font-body); font-size: 20px; color: var(--text); outline: none; margin-bottom: 36px; transition: border-color 0.2s; resize: none; }
    .contact-form input:focus, .contact-form textarea:focus { border-color: var(--text); }
    .contact-form textarea { min-height: 120px; }
    .contact-form button { font-family: var(--font-header); font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--text); color: var(--bg); border: none; padding: 16px 40px; cursor: pointer; transition: opacity 0.2s; }
    .contact-form button:hover { opacity: 0.75; }
    .contact-links { margin-top: 64px; padding-top: 48px; border-top: 1px solid var(--border); }
    .contact-link { display: flex; justify-content: space-between; align-items: center; font-size: 20px; text-decoration: none; color: var(--text); opacity: 0.6; padding: 16px 0; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
    .contact-link:hover { opacity: 1; }

    /* ERROR BANNER */
    .config-error { background: #fff0f0; border: 2px solid #cc0000; color: #cc0000; font-family: monospace; font-size: 14px; padding: 24px 32px; margin: 100px 32px 32px; border-radius: 4px; white-space: pre-wrap; line-height: 1.6; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .detail-top { grid-template-columns: 1fr; min-height: auto; }
      .detail-intro { border-right: none; border-bottom: 1px solid var(--border); padding: 40px 24px; }
      .detail-hero-img { min-height: 50vw; }
      .detail-gallery { grid-template-columns: 1fr 1fr; }
      .detail-gallery-item:last-child { display: none; }
      .detail-meta { flex-wrap: wrap; }
      .detail-meta-item { flex: 0 0 50%; border-bottom: 1px solid var(--border); }
      .about-layout { grid-template-columns: 1fr; }
      .about-photo-col img, .about-photo-placeholder { aspect-ratio: 4/3; }
    }

    @media (max-width: 768px) {
      header { padding: 0 24px; }
      nav { gap: 24px; }
      .hero { padding: 48px 24px 40px; }
      .section-label { padding: 0 24px; }
      .projects-scroll-wrap { padding: 0 24px 60px; }
      .project-slide { grid-template-columns: 1fr; gap: 32px; padding: 48px 24px; min-height: auto; }
      .project-slide:nth-child(even) .slide-visual,
      .project-slide:nth-child(even) .slide-content { order: unset; }
      .projects-header { padding: 40px 24px 32px; }
      .about-inner, .contact-inner { padding: 60px 24px; }
      .skills-grid { grid-template-columns: 1fr; }
      .detail-back { padding: 24px 24px 0; }
      .detail-next { padding: 40px 24px; }
      .detail-gallery { grid-template-columns: 1fr; }
      .detail-gallery-item:not(:first-child) { display: none; }
      .detail-meta-item { flex: 0 0 100%; }
    }
  </style>
</head>

// ===========================================================
// RENDERER -- no need to edit below this line
// ===========================================================

var PH = ["(o)", "<>", "/\\", "( )", "[ ]"];

function imgTag(src, alt) {
  return '<img src="' + src + '" alt="' + (alt || '') + '">';
}

function thumbHTML(src, i) {
  if (src) {
    return '<div class="card-thumb">' + imgTag(src) + '</div>';
  }
  return '<div class="card-thumb"><div class="card-thumb-inner">' + PH[i] + '</div></div>';
}

function slideVisualHTML(src, i) {
  if (src) {
    return '<div class="slide-visual">' + imgTag(src) + '</div>';
  }
  return '<div class="slide-visual">' + PH[i] + '</div>';
}

function heroHTML(src, i) {
  if (src) {
    return '<div class="detail-hero-img">' + imgTag(src) + '</div>';
  }
  return '<div class="detail-hero-img"><div class="detail-hero-placeholder">' + PH[i] + '</div></div>';
}

function galleryItemHTML(src, i) {
  if (src) {
    return '<div class="detail-gallery-item">' + imgTag(src) + '</div>';
  }
  return '<div class="detail-gallery-item"><div class="detail-gallery-placeholder">' + PH[i] + '</div></div>';
}

  var html  = '';

    document.getElementById('favicon').href = cfg.favicon;
  }

  // Logo
  var logoEl = document.getElementById('logoLink');
  if (cfg.logoImage) {
    logoEl.innerHTML = imgTag(cfg.logoImage, cfg.logoText || 'Logo');
  } else {
    logoEl.textContent = cfg.logoText;
  }

  // HOME
  html += '<div id="home" class="page active">';
  html += '<div class="hero">';
  html += '<h1>' + cfg.heroHeading + '</h1>';
  html += '<p>' + cfg.heroSubtext + '</p>';
  html += '</div>';
  html += '<div class="section-label">Selected Projects</div>';
  html += '<div class="projects-scroll-wrap"><div class="projects-scroll" id="homeScroll">';
  for (var i = 0; i < P.length; i++) {
    var p = P[i];
    html += '<div class="project-card" onclick="goToProject(' + i + ')">';
    html += thumbHTML(p.thumbImg, i);
    html += '<div class="card-body">';
    html += '<div class="card-tag">' + p.tags[0] + '</div>';
    html += '<div class="card-title">' + p.title + '</div>';
    html += '<div class="card-desc">' + p.cardDesc + '</div>';
    html += '</div>';
    html += '<div class="card-arrow">-&gt;</div>';
    html += '</div>';
  }
  html += '</div></div></div>';

  // PROJECTS LIST
  html += '<div id="projects" class="page">';
  html += '<div class="projects-header"><h1>Projects</h1></div>';
  for (var i = 0; i < P.length; i++) {
    var p   = P[i];
    var num = (i + 1 < 10 ? '0' : '') + (i + 1) + ' / ' + (total < 10 ? '0' : '') + total;
    html += '<div class="project-slide" id="project-' + i + '">';
    html += slideVisualHTML(p.slideImg, i);
    html += '<div class="slide-content">';
    html += '<div class="slide-num">' + num + '</div>';
    html += '<div class="slide-title">' + p.title + '</div>';
    html += '<div class="slide-tag-row">';
    for (var t = 0; t < p.tags.length; t++) {
      html += '<span class="slide-tag">' + p.tags[t] + '</span>';
    }
    html += '</div>';
    html += '<p class="slide-desc">' + p.slideDesc + '</p>';
    html += '<a class="slide-link" onclick="showDetail(' + i + ')">View case study -&gt;</a>';
    html += '</div></div>';
  }
  html += '</div>';

  // DETAIL PAGES
  for (var i = 0; i < P.length; i++) {
    var p     = P[i];
    var nextI = (i + 1) % total;
    var nextP = P[nextI];
    var isLast = (i === total - 1);

    html += '<div id="detail-' + i + '" class="page">';
    html += '<a class="detail-back" onclick="backToProjects(' + i + ')">&larr; All Projects</a>';
    html += '<div class="detail-top">';
    html += '<div class="detail-intro">';
    html += '<div class="detail-title">' + p.title + '</div>';
    html += '<div class="detail-subtitle">' + p.subtitle + '</div>';
    html += '<div class="detail-tag-row">';
    for (var t = 0; t < p.tags.length; t++) {
      html += '<span class="detail-tag">' + p.tags[t] + '</span>';
    }
    html += '</div>';
    html += '<div class="detail-description">';
    for (var d = 0; d < p.description.length; d++) {
      html += '<p>' + p.description[d] + '</p>';
    }
    html += '</div></div>';
    html += heroHTML(p.heroImg, i);
    html += '</div>';

    html += '<div class="detail-meta">';
    html += '<div class="detail-meta-item"><div class="detail-meta-label">Year</div><div class="detail-meta-value">' + p.year + '</div></div>';
    html += '<div class="detail-meta-item"><div class="detail-meta-label">Role</div><div class="detail-meta-value">' + p.role + '</div></div>';
    html += '<div class="detail-meta-item"><div class="detail-meta-label">Tools</div><div class="detail-meta-value">' + p.tools + '</div></div>';
    html += '<div class="detail-meta-item"><div class="detail-meta-label">Link</div><div class="detail-meta-value">';
    html += p.link ? '<a href="' + p.link + '" target="_blank">View live &nearr;</a>' : '&mdash;';
    html += '</div></div></div>';

    html += '<div class="detail-gallery">';
    for (var g = 0; g < p.galleryImgs.length; g++) {
      html += galleryItemHTML(p.galleryImgs[g], i);
    }
    html += '</div>';

    html += '<div class="detail-next" onclick="showDetail(' + nextI + ')">';
    html += '<div><div class="detail-next-label">' + (isLast ? 'Back to First' : 'Next Project') + '</div>';
    html += '<div class="detail-next-title">' + nextP.title + '</div></div>';
    html += '<div class="detail-next-arrow">&rarr;</div>';
    html += '</div></div>';
  }

  // ABOUT
  var ab = cfg.about;
  html += '<div id="about" class="page"><div class="about-inner">';
  html += '<h1>About Me</h1>';
  html += '<div class="about-layout">';
  html += '<div class="about-photo-col">';
  if (ab.photo) {
    html += imgTag(ab.photo, 'Photo');
  } else {
    html += '<div class="about-photo-placeholder">&#10022;</div>';
  }
  html += '</div>';
  html += '<div class="about-text-col"><div class="about-body">';
  for (var i = 0; i < ab.paragraphs.length; i++) {
    html += '<p>' + ab.paragraphs[i] + '</p>';
  }
  html += '</div><div class="skills-grid">';
  for (var s = 0; s < ab.skills.length; s++) {
    var sk = ab.skills[s];
    html += '<div class="skill-group"><h3>' + sk.heading + '</h3><ul>';
    for (var it = 0; it < sk.items.length; it++) {
      html += '<li>' + sk.items[it] + '</li>';
    }
    html += '</ul></div>';
  }
  html += '</div></div></div></div></div>';

  // CONTACT
  var co = cfg.contact;
  html += '<div id="contact" class="page"><div class="contact-inner">';
  html += '<h1>' + co.heading + '</h1>';
  html += '<p class="sub">' + co.subtext + '</p>';
  html += '<div class="contact-form">';
  html += '<label>Name</label><input type="text" placeholder="Your name" />';
  html += '<label>Email</label><input type="email" placeholder="your@email.com" />';
  html += '<label>Message</label><textarea placeholder="Tell me what you\'re working on..."></textarea>';
  html += '<button type="button">Send message</button>';
  html += '</div>';
  html += '<div class="contact-links">';
  for (var i = 0; i < co.links.length; i++) {
    var lnk = co.links[i];
    var ext = lnk.url.indexOf('http') === 0 ? ' target="_blank"' : '';
    html += '<a href="' + lnk.url + '" class="contact-link"' + ext + '>';
    html += '<span>' + lnk.label + '</span><span>&nearr;</span></a>';
  }
  html += '</div></div></div>';

  document.getElementById('app').innerHTML = html;
}

// Routing
function showPage(id) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var links = document.querySelectorAll('nav a');
  for (var i = 0; i < links.length; i++) {
    links[i].classList.toggle('active', links[i].getAttribute('data-page') === id);
  }
  window.scrollTo(0, 0);
}

function goToProject(index) {
  showPage('projects');
  setTimeout(function() {
    var slide = document.getElementById('project-' + index);
    if (slide) slide.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function showDetail(index) { showPage('detail-' + index); }

function backToProjects(index) {
  showPage('projects');
  setTimeout(function() {
    var slide = document.getElementById('project-' + index);
    if (slide) slide.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// Run — with visible error if something goes wrong
try {
  renderApp();
} catch(e) {
  document.getElementById('app').innerHTML =
    '<div class="config-error">' +
    'There is an error in SITE_CONFIG. Open this file and look for the problem near the text shown below.\n\n' +
    e.toString() +
    '\n\nCommon causes:\n' +
    '- A missing comma between two items\n' +
    '- A quote mark inside a string (use the HTML code &amp;#39; instead of an apostrophe)\n' +
    '- A missing closing bracket ] or brace }' +
    '</div>';
}

// Drag-to-scroll (runs after render)
setTimeout(function() {
  var scrollEl = document.getElementById('homeScroll');
  if (!scrollEl) return;
  var isDragging = false, startX, scrollLeft;
  scrollEl.addEventListener('mousedown', function(e) {
    isDragging = true; startX = e.pageX - scrollEl.offsetLeft;
    scrollLeft = scrollEl.scrollLeft; scrollEl.style.userSelect = 'none';
  });
  document.addEventListener('mouseup', function() { isDragging = false; scrollEl.style.userSelect = ''; });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    scrollEl.scrollLeft = scrollLeft - (e.pageX - scrollEl.offsetLeft - startX) * 1.4;
  });
  scrollEl.addEventListener('click', function(e) {
    if (Math.abs(scrollEl.scrollLeft - scrollLeft) > 4) e.stopPropagation();
  }, true);
}, 100);

// Nav
document.querySelectorAll('nav a').forEach(function(a) {
  a.addEventListener('click', function(e) { e.preventDefault(); showPage(a.getAttribute('data-page')); });
});
document.getElementById('logoLink').addEventListener('click', function(e) { e.preventDefault(); showPage('home'); });

</script>
